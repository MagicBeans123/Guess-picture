<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>猜画画</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <div class="left-panel">
      <h1>猜画画</h1>
      <p class="hint">画一个东西，让 AI 猜～</p>
      <div class="canvas-wrap">
        <canvas id="canvas" width="500" height="500"></canvas>
      </div>
      <div class="controls">
        <button id="clearBtn" class="btn btn-secondary">擦掉重画</button>
        <button id="guessBtn" class="btn btn-primary">猜一猜</button>
      </div>
      <div class="status" id="statusText">画好了就点「猜一猜」</div>
    </div>

    <div class="right-panel">
      <div class="mascot-wrap">
        <div class="speech-bubble" id="speechBubble">
          <span id="speechText">画个东西，我来猜～</span>
        </div>
        <div class="mascot-video-wrap">
          <video id="mascotVideoA" class="mascot-video front" muted playsinline loop
            poster="images/mascot.png"></video>
          <video id="mascotVideoB" class="mascot-video back" muted playsinline loop
            poster="images/mascot.png"></video>
        </div>
        <div class="mascot-name">蜗壳小助手</div>
      </div>
      <div id="mainResult" class="main-result" aria-hidden="true"></div>
      <div id="mainConf" class="main-conf" aria-hidden="true"></div>
      <div class="bar-wrap" style="display:none;"><div id="mainBar" class="bar-inner"></div></div>
      <div id="list" class="result-list" style="display:none;"></div>
      <div id="empty" class="result-empty" style="display:none;"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
